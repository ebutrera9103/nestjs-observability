---
workflow:
  rules:
    # Ejecutar el pipeline para un evento de Merge Request cuyo destino sea la rama main
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      when: always

    # Ejecutar el pipeline cuando se cree un tag que cumpla con el patrón /^v\d+\.\d+\.\d+.*$/
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_REF_NAME =~ /^v\d+\.\d+\.\d+.*$/'
      when: always

    # Ejecutar el pipeline cuando se haga un push a cualquier branch excepto main
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH != "main"'
      when: always

    # Desactivar el pipeline en todos los demás casos
    - when: never


include:
  - project: "fanatyx/deploy"
    ref: main # TODO
    file: .gitlab-ci-template.yml

stages:
  - build
  - publish

# https://gitlab.topfollowers.com/help/user/packages/npm_registry/index.md#publishing-a-package-via-a-cicd-pipeline
build-node:
  stage: build
  extends: .node-build
  script:
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.topfollowers.com/".insteadOf "https://gitlab.topfollowers.com/"
    - npm install
    - npm run build:all
    - npm run build:lib

# https://gitlab.topfollowers.com/help/user/packages/npm_registry/index.md#publishing-a-package-via-a-cicd-pipeline
publish:
  stage: publish
  extends: .node-publish
  rules:
    - if: $CI_COMMIT_REF_NAME =~ /^v\d+\.\d+\.\d+.*$/
      changes:
        - package.json
