# This file configures the OpenTelemetry Collector

# 1. Receivers: How data gets into the collector
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

# 2. Exporters: Where the collector sends the data
exporters:
  # The exporter to send data to Jaeger
  otlphttp:
    endpoint: http://jaeger:4318

# 3. Processors: How data is processed in-flight
processors:
  batch:

# 4. Service: The pipeline that connects everything
service:
  extensions: [jaeger_storage, healthcheckv2]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      # We are now only exporting to Jaeger
      exporters: [otlphttp, jaeger_storage_exporter]
  telemetry:
    resource:
      service.name: jaeger
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
    logs:
      level: info

extensions:
  healthcheckv2:
    use_v2: true
    http:

  jaeger_storage:
    backends:
      efs:
        badger:
          directories:
            keys: "/badger/key/"
            values: "/badger/data/"
          ephemeral: false
